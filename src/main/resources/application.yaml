spring:
  application:
    name: osiv
  datasource:
    url: jdbc:p6spy:h2:mem:osiv;DB_CLOSE_DELAY=-1
    driver-class-name: com.p6spy.engine.spy.P6SpyDriver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    show-sql: false

server:
  error:
    include-message: always

logging:
  level:
    p6spy: info
